workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable
      xcode: latest
      vars:
        IPHONEOS_DEPLOYMENT_TARGET: 14.0
    scripts:
      - name: Build iOS
        script: |
          cd portal_investidor-main
          flutter build ipa --release
    artifacts:
      - portal_investidor-main/build/ios/ipa/*.ipa