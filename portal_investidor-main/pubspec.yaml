name: portal_investidor
description: "Portal do Investidor - Clever Option"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Utilitários principais
  http: ^1.6.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  local_auth: ^3.0.1
  
  # UI e utilitários
  cupertino_icons: ^1.0.8
  
  # Opcionais (se usares, mantém; senão podes remover)
  image_picker: ^1.2.2
  google_maps_flutter: ^2.17.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1   # 🔧 Splash screen (agora no local correto)

# ⬇️⬇️⬇️ SPLASH SCREEN (fora da secção "flutter", ao mesmo nível) ⬇️⬇️⬇️
flutter_native_splash:
  color: "#002847"
  image: assets/images/logo.png
  android: true
  ios: true

# ⬇️⬇️⬇️ CONFIGURAÇÃO FLUTTER (assets, fonts, etc.) ⬇️⬇️⬇️
flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

  fonts:
    - family: MonaSans
      fonts:
        - asset: assets/fonts/MonaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/MonaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/MonaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/MonaSans-Bold.ttf
          weight: 700